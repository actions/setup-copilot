name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Copilot CLI
        uses: ./
        with:
          version: latest

      - name: Verify copilot is on PATH
        run: which copilot

      - name: Check version
        run: copilot --version
